name: Deploy Report to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'reports/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Find latest report
        id: report
        run: |
          LATEST=$(ls -d reports/20* | sort | tail -1)
          DATE=$(basename "$LATEST")
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "report_dir=$LATEST" >> $GITHUB_OUTPUT
      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp "${{ steps.report.outputs.report_dir }}/cbond_overview.html" _site/index.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
