name: Deploy Report to GitHub Pages

on:
  push:
    branches: [main, developer-1]
    paths:
      - 'reports/*/cbond_overview.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Render HTML reports from Markdown
        run: |
          for md in reports/????-??-??/cbond_overview.md; do
            [ -f "$md" ] || continue
            date=$(basename "$(dirname "$md")")
            out="reports/$date/cbond_overview.html"
            python scripts/render_html.py \
              --in  "$md" \
              --out "$out" \
              --title "可转债概览 · $date" \
              --trade-date "$date"
            echo "rendered: $out"
          done

      - name: Assemble _site
        run: |
          mkdir -p _site
          for dir in reports/????-??-??/; do
            date=$(basename "$dir")
            mkdir -p "_site/$date"
            [ -f "$dir/cbond_overview.html" ] && cp "$dir/cbond_overview.html" "_site/$date/index.html"
          done
          LATEST=$(ls -d reports/????-??-??/ 2>/dev/null | sort | tail -1)
          if [ -n "$LATEST" ] && [ -f "${LATEST}cbond_overview.html" ]; then
            cp "${LATEST}cbond_overview.html" _site/index.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
