<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>China CBond Monitor</title>
<style>
  :root { --bg: #0f1117; --fg: #e4e4e7; --accent: #3b82f6; --card: #1a1b23; --border: #2a2b35; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 60px 20px; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .sub { color: #9ca3af; font-size: 15px; margin-bottom: 40px; }
  .list { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 12px; }
  a.report-link { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; text-decoration: none; color: var(--fg); transition: border-color .15s, transform .1s; }
  a.report-link:hover { border-color: var(--accent); transform: translateY(-1px); }
  a.report-link .date { font-size: 17px; font-weight: 600; }
  a.report-link .arrow { color: var(--accent); font-size: 20px; }
  .badge { display: inline-block; background: var(--accent); color: #fff; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px; margin-left: 10px; }
</style>
</head>
<body>
  <h1>China CBond Monitor</h1>
  <p class="sub">可转债全景扫描 — 历史报告</p>
  <div class="list" id="list"></div>
  <script>
    // Auto-discover report files from the page listing
    // Each dated HTML file in docs/ is a report: YYYY-MM-DD.html
    const REPORTS = document.querySelectorAll ? [] : [];
    // We maintain this list manually or via CI; for now, scan known files
    const files = [];
    const el = document.getElementById('list');

    // Fetch directory listing is not possible on static hosting,
    // so we maintain a manifest array here.
    const manifest = [
      "2026-04-24"
    ];

    manifest.sort((a, b) => b.localeCompare(a)); // newest first
    manifest.forEach((date, i) => {
      const a = document.createElement('a');
      a.className = 'report-link';
      a.href = date + '.html';
      const label = i === 0 ? `<span class="date">${date}</span><span class="badge">LATEST</span>` : `<span class="date">${date}</span>`;
      a.innerHTML = label + '<span class="arrow">→</span>';
      el.appendChild(a);
    });
  </script>
</body>
</html>
